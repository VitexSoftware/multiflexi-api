openapi: '3.0.0'
servers:
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/VitexSoftware/MultiFlexi/1.0.0
  - description: Localhost
    url: http://localhost/MultiFlexi/src/api/VitexSoftware/MultiFlexi/1.0.0
  - description: Demo server
    url: https://demo.multiflexi.com/api/VitexSoftware/MultiFlexi/1.0.0
info:
  version: "1.4.0"
  title: MultiFlexi API
  description: >-
    MultiFlexi API provides comprehensive access to job execution, application management,
    event-driven processing, and user data operations. The API includes GDPR compliance
    endpoints for data export (Article 15 - Right of Access) and uses OAuth2 Application
    Flow for security.
paths:
  '/':
    get:
      summary: 'Redirect to index'
      parameters:
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '301':
          description: redirect to index.html

  '/index.{suffix}':
    get:
      summary: Endpoints listing
      description: Show current API
      operationId: getApiIndex
      security: []
      parameters:
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK

  '/login.{suffix}':
    get:
      summary: Return User's token
      description: Send login & password to obtain oAuth token
      parameters:
        - name: username
          in: query
          required: true
          description: existing user name
          schema:
            type: string
        - name: password
          in: query
          required: true
          description: existing user password
          schema:
            type: string
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '201':
          description: OK
    post:
      summary: Return User's token
      description: Send login & password to obtain oAuth token
      parameters:
        - name: username
          in: query
          required: true
          description: existing user name
          schema:
            type: string
        - name: password
          in: query
          required: true
          description: existing user password
          schema:
            type: string
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '201':
          description: OK

  '/ping.{suffix}':
    get:
      summary: job heartbeat operation
      description: >-
        This operation shows how to override the global security defined above,
        as we want to open it up for all users.
      security: []
      parameters:
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK

  '/status.{suffix}':
    get:
      summary: Get API status
      description: >-
        This operation shows how to override the global security defined above,
        as we want to open it up for all users.
      security: []
      parameters:
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'

  '/app/{appId}.{suffix}':
    get:
      tags:
        - app
      summary: Get App by ID
      description: Returns a single App wrapped in apps object
      operationId: getAppById
      parameters:
        - name: appId
          in: path
          description: ID of app to return
          required: true
          schema:
            type: integer
            format: int64
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: .json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: App not found
      security:
        - basicAuth: []

  '/app/':
    post:
      tags:
        - app
      summary: Create or Update Application
      description: Create or Update App by ID
      operationId: setAppById
      parameters:
        - name: appId
          in: query
          required: false
          description: ID of app to return
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '201':
          description: application created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/App'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: App not found
      security:
        - basicAuth: []

  '/job/{jobId}.{suffix}':
    get:
      tags:
        - job
      summary: Get job by ID
      description: Returns a single job
      operationId: getjobById
      parameters:
        - name: jobId
          in: path
          description: ID of app to return
          required: true
          schema:
            type: integer
            format: int64
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: App not found
      security:
        - basicAuth: []

  '/job/':
    post:
      tags:
        - job
      summary: Schedule a job from a RunTemplate
      description: >-
        Schedules a job for an existing RunTemplate (mirrors
        `multiflexi-cli run-template:schedule`). Used as the inbound trigger by
        external orchestrators such as Node-RED.
      operationId: setjobById
      parameters:
        - name: jobId
          in: query
          description: ID of app to return
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/LimitParam'
      requestBody:
        description: RunTemplate scheduling request
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - runtemplate_id
              properties:
                runtemplate_id:
                  type: integer
                  format: int64
                  description: RunTemplate to schedule
                  example: 15
                scheduled:
                  type: string
                  description: '"now" or a "Y-m-d H:i:s" timestamp'
                  default: now
                  example: now
                executor:
                  type: string
                  description: Overrides the RunTemplate executor
                  example: Native
                env:
                  type: object
                  description: Environment variable overrides (KEY=>VALUE) injected into the job
                  additionalProperties:
                    type: string
                  example:
                    DOCID: "FV-2025-0042"
      responses:
        '201':
          description: Job scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          description: Invalid request body
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: RunTemplate not found
        '409':
          description: RunTemplate is not active
      security:
        - basicAuth: []

  '/apps.{suffix}':
    get:
      tags:
        - app
      summary: Show All Apps
      description: All apps registeres
      operationId: listApps
      parameters:
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Apps keyed by their id
                additionalProperties:
                  $ref: '#/components/schemas/App'
        '400':
          description: Invalid status value
        '401':
           $ref: '#/components/responses/UnauthorizedError'

      security:
        - basicAuth: []

  '/jobs.{suffix}':
    get:
      tags:
        - job
      summary: Show All jobs
      description: All job jobs registered
      operationId: listjobs
      parameters:
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Jobs keyed by their id
                additionalProperties:
                  $ref: '#/components/schemas/Job'
        '400':
          description: Invalid status value
        '401':
           $ref: '#/components/responses/UnauthorizedError'
      security:
        - basicAuth: []

  '/jobs/status.{suffix}':
    get:
      summary: Get Jobs Status
      description: Retrieve all jobs status
      operationId: getJobsStatus
      parameters:
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobsStatus'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  '/tasks.{suffix}':
    get:
      tags:
        - task
      summary: List Tasks
      description: Returns a list of tasks, optionally filtered by state or runtemplate_id.
      operationId: listTasks
      parameters:
        - name: suffix
          in: path
          required: true
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "json"
        - name: state
          in: query
          schema:
            type: string
            enum: [open, running, fulfilled, fulfilled_late, failed, missed]
        - name: runtemplate_id
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
      security:
        - basicAuth: []

  '/task/{taskId}.{suffix}':
    get:
      tags:
        - task
      summary: Get Task by ID
      description: Returns a single task together with its job attempt history.
      operationId: getTaskById
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: suffix
          in: path
          required: true
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "json"
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Task not found
      security:
        - basicAuth: []

  '/runtemplate':
    post:
      tags:
        - runtemplate
      summary: Create or Update RunTemplate
      description: Create or Update RunTemplate by ID
      operationId: setRunTemplateById
      parameters:
        - name: runTemplateId
          in: query
          required: false
          description: ID of RunTemplate to return
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '201':
          description: RunTemplate created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTemplate'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: RunTemplate not found
      security:
        - basicAuth: []

  '/runtemplate/{runTemplateId}.{suffix}':
    get:
      tags:
        - runtemplate
      summary: Get RunTemplate by ID
      description: Returns a single RunTemplate
      operationId: getRunTemplateById
      parameters:
        - name: runTemplateId
          in: path
          description: ID of RunTemplate to return
          required: true
          schema:
            type: integer
            format: int64
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: .json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTemplate'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: RunTemplate not found
      security:
        - basicAuth: []
    post:
      tags:
        - runtemplate
      summary: Update RunTemplate by ID
      description: |
        Updates a RunTemplate. Request body must include id field matching
        URL parameter. Only fields present in request body will be updated
        (partial update).
      operationId: updateRunTemplateById
      parameters:
        - name: runTemplateId
          in: path
          description: ID of RunTemplate to update
          required: true
          schema:
            type: integer
            format: int64
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: .json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: integer
                  format: int64
                  description: Must match runTemplateId from URL
                active:
                  type: integer
                  enum: [0, 1]
                  description: Enable (1) or disable (0) the RunTemplate
                interv:
                  type: string
                  description: Execution interval code
                  enum: [c, n, i, h, d, w, m, y]
                name:
                  type: string
                  maxLength: 250
                  description: RunTemplate name
                delay:
                  type: integer
                  format: int32
                  description: Delay in seconds before job execution
                executor:
                  type: string
                  maxLength: 255
                  description: Executor type (Native, Docker, etc.)
                cron:
                  type: string
                  maxLength: 64
                  description: Cron expression for scheduling
                note:
                  type: string
                  description: Additional notes
            example:
              id: 15
              active: 1
      responses:
        '201':
          description: RunTemplate updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunTemplate'
        '400':
          description: Invalid ID supplied or ID mismatch
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "ID mismatch"
                  expected:
                    type: integer
                    example: 15
                  received:
                    type: integer
                    nullable: true
                    example: 99
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: RunTemplate not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "RunTemplate not found"
        '500':
          description: Update failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Update failed"
      security:
        - basicAuth: []

  '/runtemplates.{suffix}':
    get:
      tags:
        - runtemplate
      summary: Show All RunTemplates
      description: All RunTemplates registered
      operationId: listRunTemplates
      parameters:
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                description: Run templates keyed by their id
                additionalProperties:
                  $ref: '#/components/schemas/RunTemplate'
        '400':
          description: Invalid status value
        '401':
           $ref: '#/components/responses/UnauthorizedError'
      security:
        - basicAuth: []

  '/user/':
    post:
      tags:
        - user
      summary: Create or Update User
      description: Create or Update User by ID
      operationId: setUserById
      parameters:
        - name: userId
          in: query
          required: false
          description: ID of User to return
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '201':
          description: User created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: User not found
      security:
        - basicAuth: []

  '/user/{userId}.{suffix}':
    get:
      tags:
        - user
      summary: Get User by ID
      description: Returns a single User
      operationId: getUserById
      parameters:
        - name: userId
          in: path
          description: ID of User to return
          required: true
          schema:
            type: integer
            format: int64
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: .json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: User not found
      security:
        - basicAuth: []

  '/users.{suffix}':
    get:
      tags:
        - user
      summary: Show All Users
      description: All Users registered
      operationId: listUsers
      parameters:
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - $ref: '#/components/parameters/OrderParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          description: Invalid status value
        '401':
           $ref: '#/components/responses/UnauthorizedError'
      security:
        - basicAuth: []

  '/user/{userId}/roles.{suffix}':
    get:
      tags:
        - user-role
      summary: Get RBAC roles for a user
      description: Returns the list of active RBAC roles assigned to the specified user
      operationId: getUserRoles
      parameters:
        - name: userId
          in: path
          description: ID of the user
          required: true
          schema:
            type: integer
            format: int64
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RbacRole'
        '400':
          description: Invalid ID supplied
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: User not found
      security:
        - basicAuth: []

  '/user/{userId}/roles/':
    post:
      tags:
        - user-role
      summary: Set RBAC roles for a user
      description: Replace (or extend) the RBAC roles assigned to a user
      operationId: setUserRoles
      parameters:
        - name: userId
          in: path
          description: ID of the user
          required: true
          schema:
            type: integer
            format: int64
        - name: replace
          in: query
          description: When true (default), existing roles not in the supplied list are removed
          required: false
          schema:
            type: boolean
            default: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roles
              properties:
                roles:
                  type: array
                  description: List of RBAC role names to assign
                  items:
                    type: string
                  example: [admin, viewer]
                assigned_by:
                  type: integer
                  format: int64
                  description: Optional user ID of the person performing the assignment
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    format: int64
                  replace:
                    type: boolean
                  roles:
                    type: array
                    items:
                      type: string
                  role_details:
                    type: array
                    items:
                      $ref: '#/components/schemas/RbacRole'
        '400':
          description: Invalid request or unknown role names
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: User not found
      security:
        - basicAuth: []

  '/company/':
    post:
      tags:
        - company
      summary: Create or Update Company
      description: Create or Update Company by ID
      operationId: setCompanyById
      parameters:
        - name: companyId
          in: query
          required: false
          description: ID of Company to return
          schema:
            type: integer
            format: int64
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '201':
          description: Company created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Company not found
      security:
        - basicAuth: []

  '/company/{companyId}.{suffix}':
    get:
      tags:
        - company
      summary: Get Company by ID
      description: Returns a single Company
      operationId: getCompanyById
      parameters:
        - name: companyId
          in: path
          description: ID of Company to return
          required: true
          schema:
            type: integer
            format: int64
        - name: suffix
          in: path
          schema:
            type: string
            enum: [json, xml, yaml, html]
            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: .json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          description: Invalid ID supplied
        '401':
           $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Company not found
      security:
        - basicAuth: []

  '/companies.{suffix}':
    get:
      tags:
        - company
      summary: Show All Companies
      description: All Companies registered
      operationId: listCompanies
