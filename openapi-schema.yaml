  '/data-export':
    get:
      tags:
        - gdpr
      summary: Request personal data export (GDPR Article 15)
      description: Request export of all personal data associated with the authenticated user
      operationId: requestDataExport
      parameters:
        - name: action
          in: query
          required: true
          description: Action to perform
          schema:
            type: string
            enum: [export, status]
            example: export
        - name: format
          in: query
          required: false
          description: Export format (required when action=export)
          schema:
            type: string
            enum: [json, pdf]
            default: json
            example: json
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Export request successful
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DataExportResponse'
                  - $ref: '#/components/schemas/DataExportStatusResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Access denied or suspicious activity detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - basicAuth: []
    post:
      tags:
        - gdpr
      summary: Request personal data export (GDPR Article 15)
      description: Request export of all personal data associated with the authenticated user
      operationId: requestDataExportPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [export, status]
                  example: export
                format:
                  type: string
                  enum: [json, pdf]
                  default: json
                  example: json
              required:
                - action
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [export, status]
                  example: export
                format:
                  type: string
                  enum: [json, pdf]
                  default: json
                  example: json
              required:
                - action
      responses:
        '200':
          description: Export request successful
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DataExportResponse'
                  - $ref: '#/components/schemas/DataExportStatusResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Access denied or suspicious activity detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - basicAuth: []

  '/data-export-download':
    get:
      tags:
        - gdpr
      summary: Download personal data export file
      description: Download previously requested personal data export using secure token
      operationId: downloadDataExport
      parameters:
        - name: token
          in: query
          required: true
          description: Secure download token received from export request
          schema:
            type: string
            pattern: '^[a-f0-9]{64}$'
            example: 'a1b2c3d4e5f6789012345678901234567890123456789012345678901234567890123456'
      responses:
        '200':
          description: Data export file download
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportData'
              example:
                export_metadata:
                  export_date: '2025-10-20T16:15:00Z'
                  user_id: 42
                  gdpr_article: 'Article 15 - Right of Access'
                  data_controller: 'MultiFlexi'
                user_profile:
                  username: 'john.doe'
                  email: 'john.doe@example.com'
                  first_name: 'John'
                  last_name: 'Doe'
            text/plain:
              schema:
                type: string
                example: 'MultiFlexi - Personal Data Export\nGenerated: 2025-10-20T16:15:00Z\n\nUSER PROFILE\n------------\nUsername: john.doe\nEmail: john.doe@example.com'
        '400':
          description: Invalid or missing token
        '403':
          description: Token expired, already used, or access denied
        '500':
          description: Failed to generate export
      security:
        - basicAuth: []

