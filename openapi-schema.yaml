                example: "user_activity"
        credentials:
          type: array
          description: Credential metadata only (no actual passwords/secrets)
          items:
            type: object
            properties:
              credential_id:
                type: integer
                example: 8
              credential_name:
                type: string
                example: "Production Database Access"
              company_id:
                type: integer
                example: 15
              credential_type:
                type: string
                example: "database"
              note:
                type: string
                example: "Actual credential values are not included for security reasons"
        activity_logs:
          type: array
          items:
            type: object
            properties:
              log_id:
                type: integer
                example: 12547
              company_id:
                type: integer
                nullable: true
                example: 15
              application_id:
                type: integer
                nullable: true
                example: 5
              severity:
                type: string
                example: "info"
              source:
                type: string
                example: "UserLogin"
              message:
                type: string
                example: "User successfully logged in"
              timestamp:
                type: string
                format: date-time
                example: "2024-10-20T08:30:15Z"
        job_history:
          type: array
          items:
            type: object
            properties:
              job_id:
                type: integer
                example: 8521
              application_id:
                type: integer
                example: 5
              company_id:
                type: integer
                example: 15
              started_at:
                type: string
                format: date-time
                example: "2024-10-19T14:20:00Z"
              completed_at:
                type: string
                format: date-time
                nullable: true
                example: "2024-10-19T14:25:30Z"
              exit_code:
                type: integer
                nullable: true
                example: 0
              status:
                type: string
                example: "success"
        consent_records:
          type: object
          properties:
            consent_records:
              type: array
              items:
                type: object
                properties:
                  consent_id:
                    type: integer
                    example: 245
                  consent_type:
                    type: string
                    example: "analytics"
                  status:
                    type: string
                    enum: [granted, denied]
                    example: "granted"
                  details:
                    type: object
                    nullable: true
                    description: Additional consent details
                  policy_version:
                    type: string
                    example: "1.0"
                  granted_at:
                    type: string
                    format: date-time
                    example: "2024-05-15T16:45:00Z"
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                    example: "2025-05-15T16:45:00Z"
                  withdrawn_at:
                    type: string
                    format: date-time
                    nullable: true
                    example: null
                  ip_address:
                    type: string
                    example: "192.168.1.100"
            consent_audit_trail:
              type: array
              items:
                type: object
                properties:
                  action:
                    type: string
                    example: "granted"
                  consent_type:
                    type: string
                    example: "analytics"
                  old_value:
                    type: object
                    nullable: true
                  new_value:
                    type: object
                    nullable: true
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-05-15T16:45:00Z"
                  ip_address:
                    type: string
                    example: "192.168.1.100"
        session_history:
          type: object
          properties:
            note:
              type: string
              example: "Session history is not permanently stored in the database"
            current_session_info:
              type: object
              properties:
                session_id:
                  type: string
                  example: "abc123def456ghi789"
                started_at:
                  type: string
                  example: "unknown"
                ip_address:
                  type: string
                  example: "192.168.1.100"
        audit_trails:
          type: object
          properties:
            data_export_requests:
              type: array
              items:
                type: object
                properties:
                  message:
                    type: string
                    example: "User requested data export in json format from IP 192.168.1.100"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-10-20T16:15:00Z"
      required:
        - export_metadata
        - user_profile
        - company_associations
        - credentials
        - activity_logs
        - job_history
        - consent_records
        - session_history
        - audit_trails

  responses:
    UnauthorizedError:
      description: Authentication information is missing or invalid
      headers:
        WWW_Authenticate:
          schema:
            type: string

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  parameters:
    LimitParam:
      name: limit
      in: query
      description: maximum number of results to return
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20

    OffsetParam:
      name: offset
      in: query
      description: number of records to skip (for pagination)
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0

    OrderParam:
      name: order
      in: query
      description: field name to order results by (use '-' prefix for descending, e.g. '-id')
      required: false
      schema:
        type: string
        example: "-id"

tags:
  - name: gdpr
    description: GDPR compliance endpoints
    externalDocs:
      description: GDPR Article 15 - Right of Access
      url: 'https://gdpr.eu/article-15-right-of-access/'
  - name: app
    description: Application management
  - name: job
    description: Job execution management
  - name: user
    description: User management
  - name: company
    description: Company management
  - name: runtemplate
    description: Run template management
  - name: eventsource
    description: Event source management (webhook adapter database connections)
  - name: eventrule
    description: Event rule management (event-to-RunTemplate mappings)
  - name: user-role
    description: RBAC role management for users
