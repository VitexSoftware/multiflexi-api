            default: "html"
          description: force format suffix
          allowEmptyValue: true
          example: json
          required: true
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '201':
          description: OK

  '/ping.{suffix}':
    get:
      summary: job heartbeat operation
      description: >-
        This operation shows how to override the global security defined above,
