  '/logout':
    post:
      summary: Odhlášení uživatele (invalidate token/session)
      description: Invalidační aktuální uživatelskou session nebo token (OAuth2, JWT, případně session cookie).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Uživatelský token k invalidaci
      responses:
        '200':
          description: Odhlášení proběhlo úspěšně
        '401':
          description: Uživatel není přihlášen nebo token je neplatný

  '/data-export':
    get:
      tags:
        - gdpr
      summary: Request personal data export (GDPR Article 15)
      description: Request export of all personal data associated with the authenticated user
      operationId: requestDataExport
      parameters:
        - name: action
          in: query
          required: true
          description: Action to perform
          schema:
            type: string
            enum: [export, status]
            example: export
        - name: format
          in: query
          required: false
          description: Export format (required when action=export)
          schema:
            type: string
            enum: [json, pdf]
            default: json
            example: json
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Export request successful
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DataExportResponse'
                  - $ref: '#/components/schemas/DataExportStatusResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Access denied or suspicious activity detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - basicAuth: []
    post:
      tags:
        - gdpr
      summary: Request personal data export (GDPR Article 15)
      description: Request export of all personal data associated with the authenticated user
      operationId: requestDataExportPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [export, status]
                  example: export
                format:
                  type: string
                  enum: [json, pdf]
                  default: json
                  example: json
              required:
                - action
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [export, status]
                  example: export
                format:
                  type: string
                  enum: [json, pdf]
                  default: json
                  example: json
              required:
                - action
      responses:
        '200':
          description: Export request successful
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DataExportResponse'
                  - $ref: '#/components/schemas/DataExportStatusResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Access denied or suspicious activity detected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - basicAuth: []

  '/data-export-download':
    get:
      tags:
        - gdpr
      summary: Download personal data export file
      description: Download previously requested personal data export using secure token
      operationId: downloadDataExport
      parameters:
        - name: token
          in: query
          required: true
          description: Secure download token received from export request
          schema:
            type: string
            pattern: '^[a-f0-9]{64}$'
            example: 'a1b2c3d4e5f6789012345678901234567890123456789012345678901234567890123456'
      responses:
        '200':
          description: Data export file download
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportData'
              example:
                export_metadata:
                  export_date: '2025-10-20T16:15:00Z'
                  user_id: 42
                  gdpr_article: 'Article 15 - Right of Access'
                  data_controller: 'MultiFlexi'
                user_profile:
                  username: 'john.doe'
                  email: 'john.doe@example.com'
                  first_name: 'John'
                  last_name: 'Doe'
            text/plain:
              schema:
                type: string
                example: 'MultiFlexi - Personal Data Export\nGenerated: 2025-10-20T16:15:00Z\n\nUSER PROFILE\n------------\nUsername: john.doe\nEmail: john.doe@example.com'
        '400':
          description: Invalid or missing token
        '403':
          description: Token expired, already used, or access denied
        '500':
          description: Failed to generate export
      security:
        - basicAuth: []

components:
  schemas:
    App:
      x-swagger-router-model: com.vitexsoftware.multiflexi.model.App
      required:
        - name
        - executable
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: matcher
        executable:
          type: string
          example: multiflexi-probe
        tags:
          type: array
          xml:
            wrapped: true
          items:
            $ref: '#/components/schemas/Tag'
        status:
          type: string
          description: App status in the store
          enum:
            - available
            - pending
            - sold
      xml:
        name: App
      type: object

    User:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        enabled:
          type: boolean
          example: true
        settings:
          type: string
        email:
          type: string
          format: email
        firstname:
          type: string
        lastname:
          type: string
        password:
          type: string
        login:
          type: string
        DatCreate:
          type: string
          format: date-time
        DatSave:
          type: string
          format: date-time
        last_modifier_id:
          type: integer
          format: int64
          example: 10

    Job:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        app_id:
          type: integer
          format: int64
          example: 10
        begin:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        company_id:
          type: integer
          format: int64
          example: 10
        exitcode:
          type: integer
          format: int32
        stdout:
          type: string
          format: binary
        stderr:
          type: string
          format: binary
        launched_by:
          type: string
        env:
          type: string
        command:
          type: string
        schedule:
          type: string
        executor:
          type: string
          default: "Native"
        runtemplate_id:
          type: integer
          format: int64
        app_version:
          type: string
          default: "n/a"

    RunTemplate:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        active:
          type: boolean
          example: true  
        app_id:
          type: integer
          format: int64
          example: 10
        company_id:
          type: integer
          format: int64
          example: 10
        iterv:
          type: string
          description: interval
          enum:
            - n
            - h
            - d
            - w
            - m
            - y
        prepared:
          type: boolean
          example: true
        success:
          type: string
          maxLength: 250
        fail:
          type: string
          maxLength: 250
        name:
          type: string
          maxLength: 250

    ConfField:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        app_id:
          type: integer
          format: int64
          example: 10
        keyname:
          type: string
        type:
          type: string
          enum:
            - text
            - number
            - date
            - email
            - password
            - checkbox
        description:
          type: string
        defval:
          type: string

    Configuration:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        app_id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
        value:
          type: string

    Customer:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        enabled:
          type: boolean
          example: true
        settings:
          type: string
        email:
          type: string
          format: email
        firstname:
          type: string
        lastname:
          type: string
        password:
          type: string
        login:
          type: string
        DatCreate:
          type: string
          format: date-time
        DatSave:
          type: string
          format: date-time

    Tag:
      x-swagger-router-model: com.vitexsoftware.multiflexi.model.Tag
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: tag
      type: object

    Company:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        enabled:
          type: boolean
          example: false
        settings:
          type: string
        logo:
          type: string
        name:
          type: string
          maxLength: 32
        code:
          type: string
          maxLength: 10
          example: ''
          description: Company Code
        ic:
          type: string
          maxLength: 32
        DatCreate:
          type: string
          format: date-time
        DatUpdate:
          type: string
          format: date-time
        customer:
          type: integer
          format: int64
          example: 10
        email:
          type: string
          format: email
          maxLength: 64

    Credential:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        company_id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          maxLength: 32
        type:
          type: string
          enum:
            - password
            - token
            - certificate
        value:
          type: string
          maxLength: 255
        DatCreate:
          type: string
          format: date-time
        DatUpdate:
          type: string
          format: date-time

    CredentialType:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          maxLength: 32
        description:
          type: string
          maxLength: 255
        url:
          type: string
          maxLength: 255
        logo:
          type: string
          maxLength: 255
        DatCreate:
          type: string
          format: date-time
        DatUpdate:
          type: string
    Topic:
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          maxLength: 32
        description:
          type: string
          maxLength: 255
        color:
          type: string
          maxLength: 7
          example: '#000000'
        DatCreate:
          type: string
          format: date-time
        DatUpdate:
          type: string
    Status:
      properties:
        companies:
          type: integer
          example: "200"
        apps:
          type: integer
          example: "200"
        runtemplates:
          type: integer
          example: "200"
        topics:
          type: integer
          example: "200"
        credentials:
          type: integer
          example: "200"
        credentialtypes:
          type: integer
          example: "200"
        database:
          type: "string"
          example: "mysql:host=localhost;port=3307;dbname=testdb"
        daemon:
          type: "string"
          example: "running"
        timestamp:
          type: string
          format: date-time
          example: "2023-10-01T12:00:00Z"
    JobsStatus:
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2023-10-01T12:00:00Z"
        successful_jobs:
          type: integer
          description: Successful jobs
        failed_jobs:
          type: integer
          description: Failed jobs
        incomplete_jobs:
          type: integer
          description: Incomplete jobs
        total_applications:
          type: integer
          description: Total applications
        repeated_jobs:
          type: integer
          description: Repeated jobs
        total_jobs:
          type: integer
          description: Total jobs

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: "Invalid request parameters"
        success:
          type: boolean
          example: false
      required:
        - error

    DataExportResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        download_url:
          type: string
          format: uri
          description: Secure download URL for the exported data
          example: "/data-export.php?token=a1b2c3d4e5f6789012345678901234567890123456789012345678901234567890123456"
        format:
          type: string
          enum: [json, pdf]
          description: Format of the exported data
          example: "json"
        generated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the export was generated
          example: "2025-10-20T16:15:00Z"
        expires_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the download link expires
          example: "2025-10-20T17:15:00Z"
        notification_sent:
          type: boolean
          description: Whether email notification was sent to user
          example: true
      required:
        - success
        - download_url
        - format
        - generated_at
        - expires_at

    DataExportStatusResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        exports:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
                description: Export request description
                example: "User requested data export in json format from IP 192.168.1.1"
              requested_at:
                type: string
                format: date-time
                description: ISO 8601 timestamp when the export was requested
                example: "2025-10-20T15:30:00Z"
            required:
              - message
              - requested_at
      required:
        - success
        - exports

    DataExportData:
      type: object
      description: Complete user personal data export structure
      properties:
        export_metadata:
          type: object
          properties:
            export_date:
              type: string
              format: date-time
              description: When the export was generated
              example: "2025-10-20T16:15:00Z"
            user_id:
              type: integer
              description: ID of the user whose data is exported
              example: 42
            export_version:
              type: string
              description: Version of the export format
              example: "1.0"
            gdpr_article:
              type: string
              description: GDPR article reference
              example: "Article 15 - Right of Access"
            data_controller:
              type: string
              description: Name of the data controller
              example: "MultiFlexi"
            retention_info:
              type: string
              description: Data retention policy information
              example: "Data is retained according to our privacy policy"
            contact_info:
              type: string
              description: Contact information for data protection inquiries
              example: "For questions about this export, contact your data protection officer"
          required:
            - export_date
            - user_id
            - gdpr_article
            - data_controller
        user_profile:
          type: object
          properties:
            user_id:
              type: integer
              example: 42
            username:
              type: string
              example: "john.doe"
            email:
              type: string
              format: email
              example: "john.doe@example.com"
            first_name:
              type: string
              example: "John"
            last_name:
              type: string
              example: "Doe"
            account_enabled:
              type: boolean
              example: true
            account_created:
              type: string
              format: date-time
              example: "2023-01-15T10:30:00Z"
            last_updated:
              type: string
              format: date-time
              nullable: true
              example: "2024-06-10T14:22:00Z"
            user_settings:
              type: object
              nullable: true
              description: User preference settings (if any)
        company_associations:
          type: array
          items:
            type: object
            properties:
              company_id:
                type: integer
                example: 15
              company_code:
                type: string
                example: "ACME001"
              company_name:
                type: string
                example: "ACME Corporation"
              company_identifier:
                type: string
                nullable: true
                example: "12345678"
              enabled:
                type: boolean
                example: true
              associated_since:
                type: string
                format: date-time
                example: "2023-03-01T09:15:00Z"
              relationship_type:
                type: string
                example: "user_activity"
        credentials:
          type: array
          description: Credential metadata only (no actual passwords/secrets)
          items:
            type: object
            properties:
              credential_id:
                type: integer
                example: 8
              credential_name:
                type: string
                example: "Production Database Access"
              company_id:
                type: integer
                example: 15
              credential_type:
                type: string
                example: "database"
              note:
                type: string
                example: "Actual credential values are not included for security reasons"
        activity_logs:
          type: array
          items:
            type: object
            properties:
              log_id:
                type: integer
                example: 12547
              company_id:
                type: integer
                nullable: true
                example: 15
              application_id:
                type: integer
                nullable: true
                example: 5
              severity:
                type: string
                example: "info"
              source:
                type: string
                example: "UserLogin"
              message:
                type: string
                example: "User successfully logged in"
              timestamp:
                type: string
                format: date-time
                example: "2024-10-20T08:30:15Z"
        job_history:
          type: array
          items:
            type: object
            properties:
              job_id:
                type: integer
                example: 8521
              application_id:
                type: integer
                example: 5
              company_id:
                type: integer
                example: 15
              started_at:
                type: string
                format: date-time
                example: "2024-10-19T14:20:00Z"
              completed_at:
                type: string
                format: date-time
                nullable: true
                example: "2024-10-19T14:25:30Z"
              exit_code:
                type: integer
                nullable: true
                example: 0
              status:
                type: string
                example: "success"
        consent_records:
          type: object
          properties:
            consent_records:
              type: array
              items:
                type: object
                properties:
                  consent_id:
                    type: integer
                    example: 245
                  consent_type:
                    type: string
                    example: "analytics"
                  status:
                    type: string
                    enum: [granted, denied]
                    example: "granted"
                  details:
                    type: object
                    nullable: true
                    description: Additional consent details
                  policy_version:
                    type: string
                    example: "1.0"
                  granted_at:
                    type: string
                    format: date-time
                    example: "2024-05-15T16:45:00Z"
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                    example: "2025-05-15T16:45:00Z"
                  withdrawn_at:
                    type: string
                    format: date-time
                    nullable: true
                    example: null
                  ip_address:
                    type: string
                    example: "192.168.1.100"
            consent_audit_trail:
              type: array
              items:
                type: object
                properties:
                  action:
                    type: string
                    example: "granted"
                  consent_type:
                    type: string
                    example: "analytics"
                  old_value:
                    type: object
                    nullable: true
                  new_value:
                    type: object
                    nullable: true
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-05-15T16:45:00Z"
                  ip_address:
                    type: string
                    example: "192.168.1.100"
        session_history:
          type: object
          properties:
            note:
              type: string
              example: "Session history is not permanently stored in the database"
            current_session_info:
              type: object
              properties:
                session_id:
                  type: string
                  example: "abc123def456ghi789"
                started_at:
                  type: string
                  example: "unknown"
                ip_address:
                  type: string
                  example: "192.168.1.100"
        audit_trails:
          type: object
          properties:
            data_export_requests:
              type: array
              items:
                type: object
                properties:
                  message:
                    type: string
                    example: "User requested data export in json format from IP 192.168.1.100"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-10-20T16:15:00Z"
      required:
        - export_metadata
        - user_profile
        - company_associations
        - credentials
        - activity_logs
        - job_history
        - consent_records
        - session_history
        - audit_trails

  responses:
    UnauthorizedError:
      description: Authentication information is missing or invalid
      headers:
        WWW_Authenticate:
          schema:
            type: string

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  parameters:
    LimitParam:
      name: limit
      in: query
      description: maximum number of results to return
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20

tags:
  - name: gdpr
    description: GDPR compliance endpoints
    externalDocs:
      description: GDPR Article 15 - Right of Access
      url: 'https://gdpr.eu/article-15-right-of-access/'
  - name: app
    description: Application management
  - name: job
    description: Job execution management
  - name: user
    description: User management
  - name: company
    description: Company management
  - name: runtemplate
    description: Run template management
